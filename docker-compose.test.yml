services:
  postgres:
    image: postgres:16-alpine
    container_name: odontocare-postgres-e2e
    environment:
      POSTGRES_USER: odontocare_test
      POSTGRES_PASSWORD: odontocare_test
      POSTGRES_DB: odontocare_test
    ports:
      - "55434:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U odontocare_test -d odontocare_test",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
